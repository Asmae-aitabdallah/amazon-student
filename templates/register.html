{% extends "base.html" %}
{% block title %}Register - Amazon Student{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <div class="form-wrap card">
      <h1>Create your account</h1>
      <!--
        novalidate lets us demonstrate server-side validation, but we keep
        the HTML5 attributes (required, type, minlength) for fast client-side
        feedback. The server still re-checks everything.
      -->
      <form method="POST" action="{{ url_for('register') }}">
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" value="{{ email }}"
                 required autocomplete="email">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 required minlength="8" autocomplete="new-password">
          <p class="hint">At least 8 characters.</p>
        </div>

        <div class="field">
          <label for="role">I am a...</label>
          <select id="role" name="role" required>
            <option value="" {% if not role %}selected{% endif %} disabled>Choose a role</option>
            <option value="student"  {% if role == 'student'  %}selected{% endif %}>Student</option>
            <option value="parent"   {% if role == 'parent'   %}selected{% endif %}>Parent or carer</option>
            <option value="educator" {% if role == 'educator' %}selected{% endif %}>Educator</option>
          </select>
        </div>

        <button class="btn" type="submit">Create account</button>
      </form>
      <p class="hint" style="margin-top:1rem;">
        Already registered? <a href="{{ url_for('login') }}">Log in</a>.
      </p>
    </div>
  </div>
</section>
{% endblock %}
